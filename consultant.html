```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultant Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8fafc; font-family: Arial; }
.sidebar {
    width:260px; background:#0f172a; height:100vh;
    position:fixed; color:white; padding:20px;
}
.main-content { margin-left:260px; padding:20px; }
.nav-item { display:block; color:#94a3b8; margin-bottom:10px; text-decoration:none; }
.nav-item:hover { color:#3b82f6; }
.selected { background:#dbeafe !important; }
</style>
</head>

<body>

<div class="sidebar">
    <h3>MedPro</h3>
    <a href="index.html" class="nav-item">Dashboard</a>
    <a href="#" class="nav-item">Patients</a>
    <a href="#" class="nav-item active">Consultant Room</a>
</div>

<div class="main-content">

<h3>Consultant Room</h3>

<table class="table">
<thead>
<tr>
<th>ID</th><th>Name</th><th>Age</th><th>Gender</th><th>Diagnosis</th>
</tr>
</thead>

<tbody id="patientTable">
</tbody>
</table>

<h5>Prescription</h5>

<textarea id="diagnosis" class="form-control mb-2" placeholder="Diagnosis"></textarea>
<textarea id="prescription" class="form-control mb-2" placeholder="Prescription"></textarea>

<button onclick="saveData()" class="btn btn-primary">Save</button>

</div>

<script>
// STATIC DATA (instead of Flask)
const patients = [
    [1,"Ali Khan",25,"Male","Flu"],
    [2,"Sara Ahmed",30,"Female","Follow-up"],
    [3,"Usman Ali",40,"Male","Critical"]
];

let selectedPatient = null;

// Render table
const table = document.getElementById("patientTable");

patients.forEach(p => {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${p[0]}</td>
        <td>${p[1]}</td>
        <td>${p[2]}</td>
        <td>${p[3]}</td>
        <td>${p[4]}</td>
    `;

    row.onclick = () => selectPatient(p[0], row);

    table.appendChild(row);
});

function selectPatient(id, row){
    selectedPatient = id;

    document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");

    console.log("Selected:", id);
}

function saveData(){
    if(!selectedPatient){
        alert("Select patient first!");
        return;
    }

    const diagnosis = document.getElementById("diagnosis").value;
    const prescription = document.getElementById("prescription").value;

    alert(`Saved for Patient ${selectedPatient}\nDiagnosis: ${diagnosis}\nPrescription: ${prescription}`);
}
</script>

</body>
</html>
```
