```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MedPro | Lab Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f1f5f9; display:flex; margin:0; font-family:Arial; }
.sidebar { width:260px; background:#0f172a; height:100vh; position:fixed; padding:2rem; color:white; }
.main { margin-left:260px; width:100%; padding:2rem; }
.glass-card { background:white; border-radius:15px; padding:20px; }
</style>
</head>

<body>

<div class="sidebar">
    <h4>MedPro Lab</h4>
    <a href="index.html" style="color:#ccc;">Dashboard</a>
</div>

<div class="main">

<div class="glass-card mb-3">
    <h5>Search Patient by ID</h5>
    <input type="number" id="searchId" class="form-control mb-2" placeholder="Enter ID">
    <button onclick="searchPatient()" class="btn btn-primary">Search</button>
</div>

<div id="patientSection" style="display:none;">
    <div class="glass-card mb-3">
        <h4 id="pname"></h4>
        <p>ID: <span id="pid"></span></p>
        <p>Contact: <span id="pphone"></span></p>
        <p>Age/Gender: <span id="page"></span></p>
    </div>

    <div class="glass-card">
        <h5>Enter Test Findings</h5>

        <input id="testName" class="form-control mb-2" placeholder="Test Name">
        <input id="testResult" class="form-control mb-2" placeholder="Result">
        <input id="refRange" class="form-control mb-2" placeholder="Reference Range">

        <select id="status" class="form-control mb-3">
            <option>Completed</option>
            <option>Pending</option>
            <option>Critical</option>
        </select>

        <button onclick="submitResult()" class="btn btn-success">Submit</button>
    </div>
</div>

<div id="noData" class="text-center mt-5">
    <h5>No Patient Selected</h5>
</div>

</div>

<script>
// Fake database
const patients = {
    1: ["Ali Khan","03001234567","25 Male"],
    2: ["Sara Ahmed","03111234567","30 Female"],
    3: ["Usman Ali","03211234567","40 Male"]
};

function searchPatient(){
    const id = document.getElementById("searchId").value;
    const p = patients[id];

    if(p){
        document.getElementById("patientSection").style.display="block";
        document.getElementById("noData").style.display="none";

        document.getElementById("pname").innerText = p[0];
        document.getElementById("pid").innerText = id;
        document.getElementById("pphone").innerText = p[1];
        document.getElementById("page").innerText = p[2];
    } else {
        alert("Patient not found");
    }
}

function submitResult(){
    alert("Result submitted successfully (demo only)");
}
</script>

</body>
</html>
```
