<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPro | Reports Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-dark: #0f172a; --sidebar-width: 260px; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        
        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary-dark);
            height: 100vh;
            position: fixed;
            padding: 2rem 1.5rem;
            color: white;
        }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .nav-item.active { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }

        .main-content {
            margin-left: var(--sidebar-width);
            padding: 2.5rem;
            width: calc(100% - var(--sidebar-width));
        }

        .report-card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: #fff1f2;
            color: #e11d48;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-5 fw-bold fs-4"><i class="fas fa-heart-pulse text-primary me-2"></i> MedPro.ai</div>
        <nav>
            <a href="/" class="nav-item"><i class="fas fa-columns me-2"></i> Dashboard</a>
            <a href="/lab_dashboard" class="nav-item"><i class="fas fa-microscope me-2"></i> Lab Portal</a>
            <a href="/patients_list" class="nav-item"><i class="fas fa-user-injured me-2"></i> Patients</a>
            <a href="/schedule" class="nav-item"><i class="fas fa-calendar-check me-2"></i> Schedule</a>
            <a href="/all_reports" class="nav-item active"><i class="fas fa-file-medical me-2"></i> Reports</a>
            <hr style="border-color: rgba(255,255,255,0.1)">
            <a href="/logout" class="nav-item text-danger"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold mb-0">Medical Reports Center</h3>
                <p class="text-muted small">Access and download patient medical history</p>
            </div>
            <div class="input-group w-25">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                <input type="text" id="reportSearch" class="form-control border-start-0" placeholder="Search by name...">
            </div>
        </div>

        <div class="row g-4" id="reportsGrid">
            {% for patient in patients %}
            <div class="col-md-6 col-lg-4 report-item">
                <div class="report-card p-4">
                    <div class="d-flex align-items-center mb-3">
                        <div class="file-icon me-3">
                            <i class="fas fa-file-pdf"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-0 patient-name">{{ patient[1] }}</h6>
                            <small class="text-muted">ID: #RE-00{{ patient[0] }}</small>
                        </div>
                    </div>
                    <div class="border-top pt-3 d-flex justify-content-between align-items-center">
                        <small class="text-muted"><i class="fas fa-phone me-1"></i> {{ patient[2] }}</small>
                        <a href="/print_bill/{{ patient[0] }}" target="_blank" class="btn btn-sm btn-dark rounded-pill px-3">
                            Generate Report
                        </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        // Simple search filter for the reports
        document.getElementById('reportSearch').addEventListener('keyup', function() {
            let filter = this.value.toLowerCase();
            let items = document.querySelectorAll('.report-item');
            
            items.forEach(item => {
                let name = item.querySelector('.patient-name').innerText.toLowerCase();
                if(name.includes(filter)) {
                    item.style.display = "";
                } else {
                    item.style.display = "none";
                }
            });
        });
    </script>

</body>
</html>
